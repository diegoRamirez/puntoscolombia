# chrome webdriver specifications

webdriver {

  # driver Type
  driver = chrome
  chrome.driver = autodownload

  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    //pageLoadStrategy="eager"
    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "window-size=1920,1080",          # Important: ensures that the DOM is fully rendered
        "start-maximized",
        "incognito",                      # if enable, could to impact download file default directory
        "disable-infobars",
        "disable-gpu",                    # Disable hardware acceleration
        "disable-default-apps",
        "disable-popup-blocking",
        "disable-dev-shm-usage",          # Use disk instead of shared memory (common problems in CI)
        //"disable-web-security",         # if enable, no work vysor PDF document, <valid licensed key >
        "disable-translate",
        "disable-logging",
        "disable-cache",
        "disable-plugins",
        "allow-running-insecure-content"
        "always-authorize-plugins",
        "disable-download-notification",

        "disable-notifications",
        "disable-extensions"
      ]

      prefs {
        download.prompt_for_download=false
        download.default_directory=${user.dir}
      }

    }
  }
}