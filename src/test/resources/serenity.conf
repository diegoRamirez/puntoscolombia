# File setup Serenity, encode Typesafe (Config-File) with HOCON

# locate in disk automation project
pathRootProject = "${user.dir}"
# Structure relative package base
basePackageProject = "${gradle.props.project.package.base}"


# System Under Test (SUT)
apps {
  application_name {
    module_name {
      dev = "https://application-dev.arreglatech.com"
      qa = "https://www.google.com/"
      stg = "https://application-stg.arreglatech.com"
    }
  }
}

webdriver {
  base.url = "#{apps.application_name.module_name.qa}"

  # timeout implicit for interactive elements on the DOM
  timeouts {
    implicitlywait = 7000
    pageload = 20000
    script = 10000
  }
  wait.for.timeout = 7000
}

# environment for default (not found args -Denvironment=)
environment = "tester"

# management environments
environments {

  # test environment from pipeline
  pipeline {
    headless.mode = true

    include "drivers/chrome.conf"

    # is required for use webdriver.capabilities."goog:chromeOptions".args += ...
    user.dir = "#{pathRootProject}"

    # if will require to add more additional capabilities specify for environemnt
    # Mode headless for Chrome modern (v137)
    #webdriver.capabilities."goog:chromeOptions".args += "--headless=new"
  }

  # test environment from local
  tester {
    headless.mode = false

    include "drivers/chrome.conf"

    # is required for use in environment pipeline, webdriver.capabilities."goog:chromeOptions".args += ...
    user.dir = "#{pathRootProject}"
  }
}

enable.markdown="story,narrative,scenario,step"

# feature files characteristics
feature {
  file.language = en
  file.encoding = "#{gradle.props.resource.encode}"
}

serenity {

  # FOR_EACH_ACTION
  # BEFORE_AND_AFTER_EACH_STEP
  # AFTER_EACH_STEP
  # FOR_FAILURES
  take.screenshots = FOR_EACH_ACTION

  extension.packages = "#{basePackageProject}.setups.hooks"
  ext.packages = "#{basePackageProject}.setups.hooks"

  # level logging trace
  logging = VERBOSE

  # encode build report
  report.encoding = "#{gradle.props.resource.encode}"
  encoding = "#{gradle.props.project.encode}"

  compress.filenames = true

  console.colors = true
}

report {
  tagtypes = "capability,feature"
  customfields {
    environment = "Quality Assurance"
    ApplicationVersion = "1.0.0"
    user = "User"
    squad = "Squad"
    order = "ApplicationVersion,environment,user,squad"
  }
}

